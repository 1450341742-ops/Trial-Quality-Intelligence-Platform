version: "3.9"

services:
  tqip:
    build: .
    container_name: trial-quality-intelligence-platform
    ports:
      - "8501:8501"
    environment:
      TQIP_DB_PATH: /app/data/trial_quality_v4.db
      TQIP_UPLOAD_DIR: /app/uploads
      # Optional AI config:
      # OPENAI_API_KEY: your_api_key
      # OPENAI_BASE_URL: https://api.openai.com/v1
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
